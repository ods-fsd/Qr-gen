<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonHub - Kody Regałów (Zebra)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #f9fafb; font-family: sans-serif; margin: 0; }
        
        /* Логіка друку спеціально для термопринтера (без тексту, тільки QR) */
        @media print {
            body * { visibility: hidden; }
            .no-print { display: none !important; }
            #printArea, #printArea * { visibility: visible !important; }
            
            #printArea { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100vw; 
                height: 100vh; 
                display: flex; 
                justify-content: center; 
                align-items: center; 
            }
            
            .qr-only-card {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                box-sizing: border-box;
                padding: 4mm; /* Відступи безпеки для термоголовки */
            }

            .qr-only-card canvas, .qr-only-card img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                display: block;
                margin: 0 auto !important;
            }

            @page { margin: 0; size: auto; } /* Довіряємо драйверу Zebra */
        }
    </style>
</head>
<body>

    <div class="no-print max-w-4xl mx-auto p-6 mt-8 bg-white rounded-2xl shadow-xl border border-gray-200">
        <div class="flex items-center gap-4 mb-6">
            <div class="bg-black w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-xl">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M7 7h10M7 12h10M7 17h10"></path></svg>
            </div>
            <div>
                <h1 class="text-2xl font-black text-gray-800">Drukarnia QR - Regały (Zebra)</h1>
                <p class="text-gray-500 text-sm">Czyste kody QR bez napisów. Drukuj każdy osobno.</p>
            </div>
        </div>

        <div id="locationsList" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[70vh] overflow-y-auto pr-2">
            </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        // Масив усіх твоїх локацій
        const LOCATIONS = [
            "Pod kominem Palety", "Pod kominem Regał", "Pod Cynkownia",
            "OW Hala-1 Regał 1", "OW Hala-1 Regał 2", "OW Hala-1 Regał 3",
            "OW Hala-1 Regał 4", "OW Hala-1 Regał 5", "OW Hala-1 Regał 6",
            "OW Hala-1 Regał 7", "OW Hala-1 Regał 8", "OW Hala-1 Regał 9",
            "OW Hala-1 Regał 10", "OW Hala-1 Regał 11", "OW Hala-1 Regał 12",
            "OW Hala-1 Regał 13", "OW Hala-1 Regał 14", "OW Hala-1 Regał Fioletowy",
            "OW Hala-1 Regał koło Śmietnika", "OW Hala-2 Ściągaczy",
            "OW Hala-2 Regał 1", "OW Hala-2 Regał 2", "OW Hala-2 Regał 3",
            "OW Hala-2 Regał 4", "OW Hala-2 Regał 5", "OW Hala-2 Regał 6",
            "OW Hala-2 Regał 7", "OW Hala-2 Regał 8", "OW Hala-2 Regał 9",
            "OW Hala-2 Regał 10", "OW Hala-2 Regał 11", "OW Hala-2 Regał 12",
            "OW Hala-2 Nierdzewna"
        ];

        // Рендеримо список кнопок
        const listContainer = document.getElementById('locationsList');
        LOCATIONS.forEach(loc => {
            const row = document.createElement('div');
            row.className = "flex justify-between items-center bg-gray-50 border border-gray-200 p-3 rounded-xl hover:bg-blue-50 transition-colors";
            
            row.innerHTML = `
                <span class="font-bold text-gray-700 text-sm pl-2">${loc}</span>
                <button onclick="printSingleQR('${loc}')" class="bg-black text-white px-5 py-2 rounded-lg font-bold text-xs hover:bg-gray-800 active:scale-95 transition-transform flex items-center gap-2">
                    Drukuj QR
                </button>
            `;
            listContainer.appendChild(row);
        });

        // Функція генерації та друку ОДНОГО коду
        function printSingleQR(locationName) {
            const area = document.getElementById('printArea');
            area.innerHTML = ''; // Очищаємо попередній
            area.classList.remove('hidden');

            const card = document.createElement('div');
            card.className = "qr-only-card bg-white";
            
            // Генеруємо чистий QR-код
            new QRCode(card, {
                text: locationName,
                width: 300, // Великий розмір для високої якості на термоголовці
                height: 300,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            area.appendChild(card);

            // Даємо час на рендер Canvas (особливо важливо для старих комп'ютерів)
            setTimeout(() => {
                window.print();
                area.classList.add('hidden'); // Ховаємо назад після друку
            }, 300);
        }
    </script>
</body>
</html>
